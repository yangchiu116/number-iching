<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數字易經專業磁場分析器</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f2f5;
            color: #333;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1a73e8;
            text-align: center;
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #1a73e8;
        }
        button {
            background-color: #1a73e8;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #1557b0;
        }
        .analysis-section {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        }
        .chart-box {
            flex: 1;
            min-width: 300px;
            background: #fff;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        .results-box {
            flex: 1.5;
            min-width: 300px;
        }
        .result-item {
            background: #f8f9fa;
            border-left: 5px solid #1a73e8;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 4px;
        }
        .star-header {
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 1px dashed #ccc;
        }
        .star-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #202124;
        }
        .energy-rank {
            color: #f4b400;
            font-weight: bold;
            margin-left: 10px;
        }
        .detail-text {
            font-size: 0.95em;
            color: #333;
            line-height: 1.6;
        }
        .error {
            color: #d93025;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>數字易經磁場分析器</h1>

        <div class="input-group">
            <input type="text" id="numberInput" placeholder="請輸入手機號碼或身分證數字...">
            <button id="analyzeButton">開始專業分析</button>
        </div>

        <div id="mainContent" style="display: none;">
            <div class="analysis-section">
                <div class="chart-box">
                    <canvas id="energyPieChart"></canvas>
                </div>

                <div class="results-box" id="resultsList">
                </div>
            </div>
        </div>

        <div id="statusMsg"></div>
    </div>

    <script>
        let myChart = null;

        document.getElementById('analyzeButton').addEventListener('click', async function() {
            const number = document.getElementById('numberInput').value.trim();
            const resultsList = document.getElementById('resultsList');
            const statusMsg = document.getElementById('statusMsg');
            const mainContent = document.getElementById('mainContent');

            if (!number) {
                statusMsg.innerHTML = '<p class="error">請輸入有效數字。</p>';
                return;
            }

            statusMsg.innerHTML = '<p style="text-align:center;">分析中...</p>';
            mainContent.style.display = 'none';

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number: number }),
                });

                const data = await response.json();

                if (data.results && data.results.sequence.length > 0) {
                    statusMsg.innerHTML = '';
                    mainContent.style.display = 'block';

                    // --- 邏輯整併：將重複的磁場放在一起 ---
                    const grouped = {};
                    data.results.sequence.forEach(item => {
                        if (!grouped[item.star]) {
                            grouped[item.star] = {
                                pairs: [item.pair],
                                details: item.details
                            };
                        } else {
                            // 避免同一個位置的數字重複加入
                            grouped[item.star].pairs.push(item.pair);
                        }
                    });

                    // 渲染清單
                    resultsList.innerHTML = '<h2>分析結果:</h2>';
                    Object.keys(grouped).forEach(starName => {
                        const group = grouped[starName];
                        const pairsDisplay = group.pairs.join('/'); // 例如 90/11

                        resultsList.innerHTML += `
                            <div class="result-item">
                                <div class="star-header">
                                    <span class="star-name">數字 ${pairsDisplay}：${starName}</span>
                                    <span class="energy-rank">${group.details.能量}</span>
                                </div>
                                <div class="detail-text">
                                    <strong>${starName}特性：</strong>${group.details.特性}<br>
                                    <strong>優點：</strong>${group.details.優點}<br>
                                    <strong>缺點：</strong>${group.details.缺點}
                                </div>
                            </div>
                        `;
                    });

                    // 更新圓餅圖
                    updateChart(data.results.summary);
                } else {
                    statusMsg.innerHTML = '<p class="error">無對應磁場組合，請嘗試其他數字。</p>';
                }
            } catch (error) {
                console.error('Error:', error);
                statusMsg.innerHTML = '<p class="error">連線失敗，請檢查伺服器狀態。</p>';
            }
        });

        function updateChart(summary) {
            const ctx = document.getElementById('energyPieChart').getContext('2d');
            const labels = Object.keys(summary);
            const counts = Object.values(summary);

            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: counts,
                        backgroundColor: [
                            '#FFD700', '#32CD32', '#4169E1', '#A9A9A9',
                            '#FF4500', '#800080', '#D2691E', '#FF69B4'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' },
                        title: { display: true, text: '號碼能量分佈圖' }
                    }
                }
            });
        }
    </script>
</body>
</html>
